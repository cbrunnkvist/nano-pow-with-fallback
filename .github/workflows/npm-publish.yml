name: Publish to npm

on:
  push:
    tags:
      - 'v*'   # pushes to tags matching v*

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      # needed for OIDC token to npmjs.com
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Publish to npm
        run: npm publish --provenance
        # The NODE_AUTH_TOKEN environment variable will be automatically
        # populated by the OIDC token exchange if the repository is
        # configured as a Trusted Publisher on npmjs.com.