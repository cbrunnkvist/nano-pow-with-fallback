name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create docs directory
        run: mkdir -p docs/src

      - name: Copy static files
        run: |
          cp benchmark.html docs/
          cp benchmark.html docs/index.html
          cp -r nano-pow docs/
          cp src/webgpu-pow.js docs/src/
          cp src/webgl-pow.js docs/src/
          cp src/index.js docs/src/
          cp src/pow-service.js docs/src/
          cp src/blake2-util.js docs/src/
          cp src/blake2b.js docs/src/
          cp src/validate-work.js docs/src/
          cp src/pow.wgsl docs/src/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
