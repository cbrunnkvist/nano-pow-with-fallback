name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create docs directory
        run: mkdir -p docs src

      - name: Copy static files
        run: |
          cp benchmark.html docs/
          cp -r nano-pow docs/
          cp src/webgpu-pow.js docs/src/
          cp src/webgl-pow.js docs/src/
          cp src/index.js docs/src/
          cp src/pow-service.js docs/src/
          cp src/pow.wgsl docs/src/

      - name: Copy nanocurrency module
        run: |
          mkdir -p docs/node_modules/nanocurrency/dist
          cp node_modules/nanocurrency/dist/nanocurrency.esm.js docs/node_modules/nanocurrency/dist/

      - name: Fix paths in benchmark.html
        run: |
          sed -i 's|"./nano-pow/|"/nano-pow/|g' docs/benchmark.html
          sed -i 's|"./src/|"/src/|g' docs/benchmark.html
          sed -i 's|"./node_modules/|"/node_modules/|g' docs/benchmark.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
